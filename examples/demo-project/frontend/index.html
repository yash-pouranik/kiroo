<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiroo Demo | DevOps Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --accent: #818cf8;
            --text: #f8fafc;
            --success: #22c55e;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--card);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--success);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            font-weight: 600;
        }

        button:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        #output {
            background: #000;
            padding: 1.5rem;
            border-radius: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #333;
        }

        .method { color: var(--primary); font-weight: bold; }
        .url { color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DevOps Dashboard</h1>
            <p>API Interaction Lab for Kiroo <span class="status-badge">Live</span></p>
        </header>

        <div class="actions">
            <button onclick="fetchData('/api/v1/projects')">List Projects (v1)</button>
            <button onclick="fetchData('/api/v2/projects')">List Projects (v2)</button>
            <button onclick="fetchData('/api/v1/deployments')">Deployments (v1)</button>
            <button onclick="fetchData('/api/v2/deployments')">Deployments (v2)</button>
        </div>

        <div id="output">Click a button to trigger API traffic...</div>
    </div>

    <script>
        async function fetchData(endpoint) {
            const out = document.getElementById('output');
            out.innerHTML = `<span class="method">GET</span> <span class="url">${endpoint}</span>...ing`;
            
            try {
                // We use relative path so Kiroo Proxy can intercept easily
                const response = await fetch('http://localhost:8080' + endpoint);
                const data = await response.json();
                out.innerHTML = `<span class="method">RES</span> <pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (err) {
                out.innerHTML = `<span style="color:red">Error: ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
